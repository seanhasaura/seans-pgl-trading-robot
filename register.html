<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="mock-api.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - PGL Trading Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body class="auth-page">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="auth-container">
        <a href="index.html" class="logo auth-logo">
            <img src="logo.png" alt="PGL Logo" class="logo-img">
            <span class="logo-text">PGL Trading</span>
        </a>
        
        <div class="glass-panel auth-panel">
            <h2>建立您的帳戶</h2>
            <p class="text-muted">開始您的全自動化量化交易之旅</p>
            
            <button type="button" id="googleSignIn" class="btn btn-google btn-block">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                使用 Google 帳戶註冊
            </button>
            
            <div class="divider">
                <span>或使用信箱註冊</span>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" required placeholder="請輸入您的姓名">
                </div>
                <div class="form-group">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" required placeholder="至少 8 個字元">
                </div>
                <div class="form-group">
                    <label for="companyCity">公司所在縣市</label>
                    <select id="companyCity" style="width:100%; padding:0.6rem; border-radius:8px; border:1px solid var(--border-color); background:rgba(10,15,24,0.5); border:1px solid var(--border-color); color:white;">
                        <option value="">-- 請選擇縣市 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="companySelect">所屬公司</label>
                    <select id="companySelect" name="company_id" style="width:100%; padding:0.6rem; border-radius:8px; border:1px solid var(--border-color); background:rgba(10,15,24,0.5); border:1px solid var(--border-color); color:white;" required>
                        <option value="">-- 請先選擇縣市 --</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">立即註冊</button>
            </form>
            
            <div class="auth-footer">
                已經有帳戶了？ <a href="login.html" class="text-accent">登入</a>
                <br><br>
                <a href="admin.html" class="text-muted" style="font-size: 0.8rem; text-decoration: underline;">[測試用] 前往後台管理</a>
            </div>
        </div>
    </div>

    <script src="auth.js?v=7"></script>
</body>
</html>
